spring.application.name=FitPinServer
spring.datasource.url=jdbc:mysql://localhost:3306/fitpin
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=86400000

spring.elasticsearch.uris=${ELASTIC_URL:}
spring.elasticsearch.api-key=${ELASTIC_API_KEY:}
app.search.reindex-on-startup=${APP_SEARCH_REINDEX_ON_STARTUP:false}